[package]
name = "sbepis"
version = "0.1.0"
edition = "2024"

[lints.clippy]
type_complexity = "allow"
too_many_arguments = "allow"
eq_op = "allow"

[features]
debug = [
	"inspector",
	"overview_camera",
	"terminal",
	"movement_indicators",
	"framerate_indicator",
	"skip_main_menu",
]
default = []
inspector = [
	"dep:bevy-inspector-egui",
	"bevy_panorbit_camera?/bevy_egui",
	"overview_camera",                 # otherwise you can't interact with the inspector...
]
metronome = []
overview_camera = ["dep:bevy_panorbit_camera"]
terminal = []
rapier_debug = []
movement_indicators = []
framerate_indicator = []
skip_main_menu = []

[dependencies]
bevy = { version = "0.16.0", features = ["wav", "mp3", "wayland"] }
bevy-inspector-egui = { version = "0.32.0", optional = true }
bevy_panorbit_camera = { version = "0.27.0", optional = true }
bevy_rapier3d = "0.31.0"
image = "0.25.2"
itertools = "0.14.0"
leafwing-input-manager = "0.17.0"
num-traits = "0.2.19"
winit = "0.30.4"
rand = "0.8.5"
uuid = "1.16.0"
serde = "1.0.215"
bevy_common_assets = { version = "0.13.0", features = ["ron"] }
faker_rand = "0.1.1"
meshtext = "0.3.1"
soundyrust = { path = "../soundyrust" }
bevy_hanabi = { git = "https://github.com/djeedai/bevy_hanabi.git" }
bevy-butler = { git = "https://github.com/jwright159/bevy-butler.git", branch = "add_sub_state" }
typetag = "0.2.19"
return-ok = { git = "https://github.com/DragonFoxCollective/return-ok.git" }
bevy_skein = "0.2.1"
bevy-marching-cubes = { path = "../bevy-marching-cubes" }
crossbeam-channel = "0.5.15"

[build-dependencies]
winres = "0.1"
